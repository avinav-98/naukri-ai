{% extends "dashboard_base.html" %}
{% block content %}
<section class="panel-card">
  <div class="panel-card-header"><h3>Admin Dashboard</h3></div>
  <div class="panel-card-body">
    <div id="adminMetrics" class="stat-grid"></div>
  </div>
</section>
<script>
async function loadAdminMetrics(){
  const res = await fetch("/api/admin/overview");
  const data = await res.json();
  const el = document.getElementById("adminMetrics");
  el.innerHTML = `
    <article class="stat-card"><h4>Total Users</h4><p class="value">${data.total_users ?? 0}</p></article>
    <article class="stat-card"><h4>Active Users</h4><p class="value">${data.active_users ?? 0}</p></article>
    <article class="stat-card"><h4>Total Jobs Scraped</h4><p class="value">${data.total_jobs_scraped ?? 0}</p></article>
    <article class="stat-card"><h4>Total Jobs Applied</h4><p class="value">${data.total_jobs_applied ?? 0}</p></article>
    <article class="stat-card"><h4>External Jobs</h4><p class="value">${data.external_jobs_count ?? 0}</p></article>
    <article class="stat-card"><h4>Pipeline Runs Today</h4><p class="value">${data.pipeline_runs_today ?? 0}</p></article>
  `;
}
loadAdminMetrics();
</script>
{% endblock %}
