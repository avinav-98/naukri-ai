{% extends "dashboard_base.html" %}
{% block content %}
<section class="panel-card table-shell">
  <div class="panel-card-header"><h3>Admin Logs</h3></div>
  <div class="panel-card-body">
    <table>
      <thead><tr><th>Time</th><th>User ID</th><th>Event</th><th>Level</th><th>Details</th></tr></thead>
      <tbody id="adminLogsTable"><tr><td colspan="5">Loading...</td></tr></tbody>
    </table>
  </div>
</section>
<script>
async function loadLogs(){
  const res = await fetch("/api/admin/logs?limit=300");
  const data = await res.json();
  const tbody = document.getElementById("adminLogsTable");
  if(!Array.isArray(data)){ tbody.innerHTML = "<tr><td colspan='5'>Access denied</td></tr>"; return; }
  tbody.innerHTML = data.map(r => `
    <tr>
      <td>${r.created_at || "-"}</td>
      <td>${r.user_id ?? "-"}</td>
      <td>${r.event_type || "-"}</td>
      <td>${r.level || "info"}</td>
      <td>${r.details || "-"}</td>
    </tr>
  `).join("");
}
loadLogs();
setInterval(loadLogs, 10000);
</script>
{% endblock %}
