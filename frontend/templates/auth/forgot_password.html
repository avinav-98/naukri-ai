{% extends "auth_base.html" %}

{% block content %}
<div class="auth-title">Forgot Password</div>
<form id="forgotForm">
  <input class="auth-input" type="email" name="email" placeholder="Email" required>
  <button class="auth-button" type="submit">Send Reset Link</button>
</form>
<p style="text-align:center;margin-top:10px"><a href="/signin">Back to login</a></p>
<script>
document.getElementById("forgotForm").addEventListener("submit", async function(e){
  e.preventDefault();
  const formData = new FormData(this);
  const res = await fetch("/forgot-password", {method:"POST", body:formData});
  const data = await res.json();
  alert(data.message || data.error || "Request processed");
});
</script>
{% endblock %}
