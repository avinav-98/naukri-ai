{% extends "auth_base.html" %}

{% block content %}
<div class="auth-title">Reset Password</div>
<form id="resetForm">
  <input class="auth-input" type="password" name="new_password" placeholder="New Password" required>
  <button class="auth-button" type="submit">Reset Password</button>
</form>
<p style="text-align:center;margin-top:10px"><a href="/signin">Back to login</a></p>
<script>
document.getElementById("resetForm").addEventListener("submit", async function(e){
  e.preventDefault();
  const formData = new FormData(this);
  const token = "{{ reset_token }}";
  const res = await fetch(`/reset-password/${token}`, {method:"POST", body:formData});
  const data = await res.json();
  if(data.status === "success"){
    alert("Password reset successful.");
    window.location="/signin";
  } else {
    alert(data.error || "Reset failed");
  }
});
</script>
{% endblock %}
