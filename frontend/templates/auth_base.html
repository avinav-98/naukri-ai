{% extends "base.html" %}

{% block body %}

<style>

.auth-container{
display:flex;
justify-content:center;
align-items:center;
height:100vh;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
}

.auth-card{
width:420px;
background:white;
padding:40px;
border-radius:8px;
box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

.auth-title{
font-size:24px;
font-weight:600;
margin-bottom:20px;
text-align:center;
}

.auth-input{
width:100%;
padding:12px;
margin-bottom:15px;
border:1px solid #ddd;
border-radius:4px;
}

.auth-button{
width:100%;
padding:12px;
background:#1f4ae0;
border:none;
color:white;
border-radius:4px;
cursor:pointer;
}

</style>

<div class="auth-container">

<div class="auth-card">

{% block content %}{% endblock %}

</div>

</div>

{% endblock %}
