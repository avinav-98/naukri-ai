<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Naukri Automation</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/mini.css@3.0.1/dist/mini-default.min.css">
<link rel="stylesheet" href="https://cdn.muicss.com/mui-0.10.3/css/mui.min.css">
<script src="https://unpkg.com/htmx.org@1.9.12"></script>
{% block head_extra %}{% endblock %}

<style>

body{
margin:0;
font-family: "Inter", "Segoe UI", Arial, sans-serif;
background:#edf2f7;
color:#1f2a37;
}

</style>

</head>

<body>
<script>
  (function(){
    const prefs = {
      theme: "{{ (ui_prefs.theme_mode if ui_prefs else 'system') }}",
      layout: "{{ (ui_prefs.layout_mode if ui_prefs else 'standard') }}",
      accent: "{{ (ui_prefs.accent_color if ui_prefs else '#0b57d0') }}"
    };
    let theme = prefs.theme;
    if(theme === "system"){
      theme = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
    }
    document.documentElement.setAttribute("data-theme", theme);
    document.documentElement.setAttribute("data-layout", prefs.layout || "standard");
    document.documentElement.style.setProperty("--accent-color", prefs.accent || "#0b57d0");
  })();
</script>

<style>
  :root{--accent-color:#0b57d0;}
  [data-theme="dark"] body{background:#1b2430;color:#f2f5f8;}
  [data-theme="dark"] .panel-card,[data-theme="dark"] .sidebar,[data-theme="dark"] .topbar{background:#243040;color:#f2f5f8;}
  [data-layout="compact"] .main-panel{max-width:960px;margin:0 auto;}
  [data-layout="wide"] .main-panel{max-width:1400px;}
  .mui-btn--primary{background:var(--accent-color)!important;border-color:var(--accent-color)!important;}
</style>

{% block body %}{% endblock %}

</body>
</html>
