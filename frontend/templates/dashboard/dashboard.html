{% extends "dashboard_base.html" %}

{% block content %}

<section class="panel-card">
  <div class="panel-card-header">
    <h3>System Overview</h3>
  </div>
  <div
    class="panel-card-body stat-grid"
    hx-get="/ui/dashboard-stats"
    hx-trigger="load, every 8s"
    hx-swap="innerHTML"
  >
    <article class="stat-card"><h4>Loading</h4><p class="value">...</p></article>
  </div>
</section>

<section class="panel-card" style="margin-top:16px;">
  <div class="panel-card-header">
    <h3>Quick Actions</h3>
  </div>
  <div class="panel-card-body">
    <a class="mui-btn mui-btn--primary" href="/fetch-jobs">Run Pipeline</a>
    <a class="mui-btn mui-btn--accent" href="/settings">Open Control Panel</a>
    <a class="mui-btn" href="/jobs-directory">View Jobs Directory</a>
  </div>
</section>

{% endblock %}
