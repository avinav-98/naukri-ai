{% extends "dashboard_base.html" %}

{% block content %}

<section class="panel-card table-shell">
  <div class="panel-card-header" style="display:flex;justify-content:space-between;align-items:center;">
    <h3>Keywords</h3>
    <a class="mui-btn btn-icon btn-download" href="/ui/keywords-download" title="Download keywords (.txt)" aria-label="Download keywords">⬇</a>
  </div>
  <div class="panel-card-body">
    <div style="display:flex;gap:8px;align-items:center;margin-bottom:10px;">
      <button class="mui-btn" onclick="copyKeywords()">Copy Keywords</button>
      <span id="copyState" style="color:#64748b;font-size:0.9rem;"></span>
    </div>
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>Keyword</th>
        </tr>
      </thead>
      <tbody id="keywordsBody" hx-get="/ui/keywords-rows" hx-trigger="load, every 20s" hx-swap="innerHTML">
        <tr><td colspan="2">Loading...</td></tr>
      </tbody>
    </table>
  </div>
</section>

<script>
function copyKeywords(){
  const rows = document.querySelectorAll('#keywordsBody tr td:nth-child(2)');
  const items = Array.from(rows).map(td => td.innerText.trim()).filter(Boolean);
  navigator.clipboard.writeText(items.join(', '));
  document.getElementById('copyState').innerText = 'Copied';
}
</script>

{% endblock %}
