{% extends "dashboard_base.html" %}

{% block content %}

<section class="panel-card table-shell">
  <div class="panel-card-header" style="display:flex;justify-content:space-between;align-items:center;">
    <h3>Key-Skills</h3>
    <div style="display:flex;gap:8px;align-items:center;">
      <a
        class="mui-btn btn-download"
        href="/ui/keywords-download"
        title="Download Key-Skills (.txt)"
        aria-label="Download Key-Skills"
        style="display:inline-flex;align-items:center;gap:6px;"
      >
        <span aria-hidden="true">⬇</span>
        <span>Download Key-Skills (.txt)</span>
      </a>
      <button
        class="mui-btn mui-btn--danger"
        hx-delete="/ui/keywords-reset"
        hx-target="#keywordsStatus"
        hx-swap="innerHTML"
        hx-on::after-request="document.body.dispatchEvent(new Event('refreshKeywords'))"
      >
        Reset Key-Skills
      </button>
    </div>
  </div>
  <div class="panel-card-body">
    <div id="keywordsStatus" style="margin-bottom:10px;">
      {% include "partials/status_message.html" with context %}
    </div>
    <div style="display:flex;gap:8px;align-items:center;margin-bottom:10px;">
      <button class="mui-btn" onclick="copyKeywords()">Copy Key-Skills</button>
      <span id="copyState" style="color:#64748b;font-size:0.9rem;"></span>
    </div>
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>Key-Skill</th>
        </tr>
      </thead>
      <tbody id="keywordsBody" hx-get="/ui/keywords-rows" hx-trigger="load, every 20s, refreshKeywords from:body" hx-swap="innerHTML">
        <tr><td colspan="2">Loading...</td></tr>
      </tbody>
    </table>
  </div>
</section>

<script>
function copyKeywords(){
  const rows = document.querySelectorAll('#keywordsBody tr td:nth-child(2)');
  const items = Array.from(rows).map(td => td.innerText.trim()).filter(Boolean);
  navigator.clipboard.writeText(items.join(', '));
  document.getElementById('copyState').innerText = 'Copied';
}
</script>

{% endblock %}
