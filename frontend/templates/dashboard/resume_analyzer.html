{% extends "dashboard_base.html" %}

{% block content %}

<section class="panel-card table-shell">
  <div class="panel-card-header">
    <h3>Resume Analyzer</h3>
  </div>
  <div class="panel-card-body">
    <p>Score is calculated from resume content, extracted key-skills, and job text (key-skills weighted higher).</p>
    <table>
      <thead>
        <tr>
          <th>Job Title</th>
          <th>Company</th>
          <th>Location</th>
          <th>Match Score</th>
          <th>Matched Key-Skills</th>
        </tr>
      </thead>
      <tbody hx-get="/ui/resume-analyzer-rows" hx-trigger="load, every 10s" hx-swap="innerHTML">
        <tr><td colspan="5">Loading...</td></tr>
      </tbody>
    </table>
  </div>
</section>

{% endblock %}
