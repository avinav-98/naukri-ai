{% extends "dashboard_base.html" %}

{% block content %}

<section class="panel-card table-shell">
  <div class="panel-card-header">
    <h3>Applied Jobs</h3>
    <button
      class="mui-btn mui-btn--danger"
      hx-delete="/ui/applied-jobs-reset"
      hx-target="#appliedStatus"
      hx-swap="innerHTML"
      hx-on::after-request="document.body.dispatchEvent(new Event('refreshApplied'))"
    >
      Reset Applied
    </button>
  </div>
  <div class="panel-card-body">
    <div id="appliedStatus" style="margin-bottom:12px;">
      {% include "partials/status_message.html" with context %}
    </div>
    <table>
      <thead>
        <tr>
          <th>Title</th>
          <th>Company</th>
          <th>Location</th>
          <th>Apply Date</th>
          <th>Job Link</th>
          <th>Status</th>
        </tr>
      </thead>
      <tbody
        hx-get="/ui/applied-jobs-rows"
        hx-trigger="load, every 12s, refreshApplied from:body"
        hx-swap="innerHTML"
      >
        <tr><td colspan="6">Loading...</td></tr>
      </tbody>
    </table>
  </div>
</section>

{% endblock %}
