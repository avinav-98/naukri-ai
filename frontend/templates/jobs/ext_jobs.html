{% extends "dashboard_base.html" %}

{% block content %}

<section class="panel-card table-shell">
  <div class="panel-card-header">
    <h3>External Jobs</h3>
    <button
      class="mui-btn mui-btn--danger"
      hx-delete="/ui/ext-jobs-reset"
      hx-target="#extStatus"
      hx-swap="innerHTML"
      hx-on::after-request="document.body.dispatchEvent(new Event('refreshExtJobs'))"
    >
      Reset External
    </button>
  </div>
  <div class="panel-card-body">
    <div id="extStatus" style="margin-bottom:12px;">
      {% include "partials/status_message.html" with context %}
    </div>
    <table>
      <thead>
        <tr>
          <th>Job Title</th>
          <th>Company Name</th>
          <th>Location</th>
          <th>Experience</th>
          <th>Resume Match Score</th>
          <th>Job Link</th>
          <th>External Apply Link</th>
          <th>Date Captured</th>
        </tr>
      </thead>
      <tbody
        hx-get="/ui/ext-jobs-rows"
        hx-trigger="load, every 12s, refreshExtJobs from:body"
        hx-swap="innerHTML"
      >
        <tr><td colspan="8">Loading...</td></tr>
      </tbody>
    </table>
  </div>
</section>

{% endblock %}
