{% extends "dashboard_base.html" %}

{% block content %}

<section class="panel-card table-shell">
  <div class="panel-card-header">
    <h3>External Jobs</h3>
  </div>
  <div class="panel-card-body">
    <table>
      <thead>
        <tr>
          <th>Title</th>
          <th>Company</th>
          <th>Location</th>
          <th>Experience</th>
          <th>Job Link</th>
          <th>External Apply</th>
          <th>Date Captured</th>
        </tr>
      </thead>
      <tbody
        hx-get="/ui/ext-jobs-rows"
        hx-trigger="load, every 12s"
        hx-swap="innerHTML"
      >
        <tr><td colspan="7">Loading...</td></tr>
      </tbody>
    </table>
  </div>
</section>

{% endblock %}
