{% extends "dashboard_base.html" %}

{% block content %}

<section class="panel-card">
  <div class="panel-card-header">
    <h3>Fetch Jobs</h3>
  </div>
  <div class="panel-card-body">
    <p>Run uses saved filters from Control Panel.</p>
    <div class="fetch-controls">
      <div style="max-width:240px;">
        <label for="scanMode">Scan Mode</label>
        <select id="scanMode" name="scan_mode">
          <option value="basic" {% if (settings.scan_mode or "basic") == "basic" %}selected{% endif %}>Basic Mode</option>
          <option value="advance" {% if settings.scan_mode == "advance" %}selected{% endif %}>Advance Mode</option>
          <option value="extreme" {% if settings.scan_mode == "extreme" %}selected{% endif %}>Extreme Mode</option>
        </select>
      </div>

      <div class="fetch-actions">
      <button
        class="mui-btn mui-btn--primary"
        hx-indicator="#pipelineLoading"
        hx-post="/ui/portal-login"
        hx-target="#actionStatus"
        hx-swap="innerHTML"
      >
        LINK NAUKRI PROFILE
      </button>

      <button
        type="button"
        class="mui-btn mui-btn--accent"
        hx-indicator="#pipelineLoading"
        hx-post="/ui/run-pipeline"
        hx-include="#scanMode"
        hx-target="#actionStatus"
        hx-swap="innerHTML"
      >
        RUN PIPELINE
      </button>

      <button
        class="mui-btn mui-btn--danger"
        hx-indicator="#pipelineLoading"
        hx-delete="/ui/clear-pipeline-runs"
        hx-target="#actionStatus"
        hx-swap="innerHTML"
      >
        CLEAR HISTORY
      </button>
      </div>
    </div>

    <div id="actionStatus" style="margin-top:14px;">
      {% include "partials/status_message.html" with context %}
    </div>
    <div id="pipelineLoading" class="loading-indicator">
      <span class="loading-dot"></span>
      <span class="loading-dot"></span>
      <span class="loading-dot"></span>
      <span>Running...</span>
    </div>
    <div
      id="goDirectoryWrap"
      hx-get="/ui/fetch-go-directory"
      hx-trigger="load, every 4s"
      hx-swap="innerHTML"
      style="margin-top:10px;"
    ></div>
  </div>
</section>

<section class="panel-card table-shell" style="margin-top:16px;">
  <div class="panel-card-header">
    <h3>Recent Runs</h3>
  </div>
  <div class="panel-card-body">
    <table>
      <thead>
        <tr>
          <th>Date</th>
          <th>Pages</th>
          <th>Apply Limit</th>
          <th>Fetched</th>
          <th>Shortlisted</th>
          <th>Message / Remark</th>
        </tr>
      </thead>
      <tbody
        hx-indicator="#pipelineLoading"
        hx-get="/ui/pipeline-runs-rows"
        hx-trigger="load, every 4s"
        hx-swap="innerHTML"
      >
        <tr><td colspan="6">Loading...</td></tr>
      </tbody>
    </table>
  </div>
</section>

{% endblock %}
