{% extends "dashboard_base.html" %}

{% block content %}

<section class="panel-card table-shell">
  <div class="panel-card-header">
    <h3>Relevant Jobs</h3>
  </div>
  <div class="panel-card-body">
    <table>
      <thead>
        <tr>
          <th>Title</th>
          <th>Company</th>
          <th>Location</th>
          <th>Score</th>
          <th>Open</th>
        </tr>
      </thead>
      <tbody
        hx-get="/ui/relevant-jobs-rows"
        hx-trigger="load, every 12s"
        hx-swap="innerHTML"
      >
        <tr><td colspan="5">Loading...</td></tr>
      </tbody>
    </table>
  </div>
</section>

{% endblock %}
