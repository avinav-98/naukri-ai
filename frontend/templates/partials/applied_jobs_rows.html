{% if jobs %}
{% for job in jobs %}
<tr>
  <td>{{ job.title or "-" }}</td>
  <td>{{ job.company or "-" }}</td>
  <td>{{ job.location or "-" }}</td>
  <td>{{ job.applied_at or "-" }}</td>
  <td>
    {% if job.job_url %}
    <a href="{{ job.job_url }}" target="_blank" rel="noopener noreferrer">Open</a>
    {% else %}-{% endif %}
  </td>
  <td>{{ job.status or "Applied" }}</td>
</tr>
{% endfor %}
{% else %}
<tr><td colspan="6">No applied jobs yet.</td></tr>
{% endif %}
