{% if jobs %}
{% for job in jobs %}
<tr>
  <td>{{ job.title or "-" }}</td>
  <td>{{ job.company or "-" }}</td>
  <td>{{ job.location or "-" }}</td>
  <td>{% if job.url %}<a href="{{ job.url }}" target="_blank">Open</a>{% else %}-{% endif %}</td>
</tr>
{% endfor %}
{% else %}
<tr><td colspan="4">No jobs available.</td></tr>
{% endif %}
