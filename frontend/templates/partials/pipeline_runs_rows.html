{% if runs %}
{% for run in runs %}
<tr>
  <td>{{ run.date }}</td>
  <td>{{ run.pages }}</td>
  <td>{{ run.apply_limit }}</td>
  <td>{{ run.fetched }}</td>
  <td>{{ run.shortlisted }}</td>
  <td>{{ run.message }}</td>
</tr>
{% endfor %}
{% else %}
<tr><td colspan="6">No runs yet.</td></tr>
{% endif %}
