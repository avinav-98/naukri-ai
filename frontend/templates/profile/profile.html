{% extends "dashboard_base.html" %}

{% block content %}

<section class="panel-card">
  <div class="panel-card-header">
    <h3>User Profile</h3>
  </div>
  <div class="panel-card-body">
    <p>Manage your session, account access, and UI preferences.</p>
    <form id="uiPrefsForm">
      <label>Theme Mode</label>
      <select name="theme_mode">
        <option value="light" {% if ui_prefs.theme_mode == "light" %}selected{% endif %}>Light</option>
        <option value="dark" {% if ui_prefs.theme_mode == "dark" %}selected{% endif %}>Dark</option>
        <option value="system" {% if ui_prefs.theme_mode == "system" %}selected{% endif %}>System</option>
      </select>
      <label>Layout</label>
      <select name="layout_mode">
        <option value="compact" {% if ui_prefs.layout_mode == "compact" %}selected{% endif %}>Compact</option>
        <option value="standard" {% if ui_prefs.layout_mode == "standard" %}selected{% endif %}>Standard</option>
        <option value="wide" {% if ui_prefs.layout_mode == "wide" %}selected{% endif %}>Wide</option>
      </select>
      <label>Accent Color</label>
      <input type="color" name="accent_color" value="{{ ui_prefs.accent_color or '#0b57d0' }}">
      <button class="mui-btn mui-btn--primary" type="submit">Save Preferences</button>
    </form>
    <hr>
    <button class="mui-btn mui-btn--primary" onclick="logout()">Logout</button>
  </div>
</section>

<script>
document.getElementById("uiPrefsForm").addEventListener("submit", async function(e){
  e.preventDefault();
  const formData = new FormData(this);
  const res = await fetch("/api/ui-preferences", {method:"POST", body:formData});
  const data = await res.json();
  if(data.status === "saved"){
    window.location.reload();
  } else {
    alert(data.error || "Unable to save preferences");
  }
});
function logout(){
  document.cookie = "session=; Max-Age=0";
  window.location = "/";
}
</script>

{% endblock %}
